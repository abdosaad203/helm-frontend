replicaCount: 2

image:
  repository: ghcr.io/abdosaad203/ecommerce-frontend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  host: ecommerce.local

pvc:
  enabled: true
  storageClass: gp2
  accessMode: ReadWriteOnce
  size: 2Gi
  mountPath: /var/log/nginx