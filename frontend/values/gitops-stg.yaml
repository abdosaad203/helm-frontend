replicaCount: 1

image:
  repository: ghcr.io/abdosaad203/frontend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  host: staging.ecommerce.local

pvc:
  enabled: true
  storageClass: gp2
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /var/log/nginx